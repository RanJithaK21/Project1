apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-deploy
  labels:
    app: devops

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: devops

  template:
    metadata:
      labels:
        app: devops

    spec:
      serviceAccountName: app-sa   # ✅ RBAC

      securityContext:
        runAsNonRoot: true

      imagePullSecrets:
        - name: helm

      containers:
        - name: my-nodeapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.containerPort }}

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
